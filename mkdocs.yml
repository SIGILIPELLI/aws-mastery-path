site_name: AWS Mastery Path
site_description: A structured, module-wise AWS training program from entry level to master level, with runnable CLI commands and real AWS configuration in every module.
site_url: https://sigilipelli.github.io/aws-mastery-path/
repo_url: https://github.com/SIGILIPELLI/aws-mastery-path
repo_name: aws-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & AWS CLI": level-1/01-setup-cli.md
      - "02 · IAM & Security Basics": level-1/02-iam-security-basics.md
      - "03 · EC2 Compute": level-1/03-ec2-compute.md
      - "04 · S3 Storage": level-1/04-s3-storage.md
      - "05 · VPC Networking Basics": level-1/05-vpc-networking-basics.md
      - "06 · RDS Databases": level-1/06-rds-databases.md
      - "07 · Lambda & Serverless": level-1/07-lambda-serverless.md
      - "08 · CloudWatch Monitoring & Logging": level-1/08-cloudwatch-monitoring.md
      - "09 · CloudFormation & IaC Intro": level-1/09-cloudformation-iac.md
      - "10 · Capstone — Serverless Web App": level-1/10-capstone-project.md
  - "Level 2 · Intermediate":
